  # Valkyrie Connectors: The Imperial Channels
  valkyrie-connectors:
    build: ./valkyrie-connectors
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.connectors.rule=PathPrefix('/api/connect')"
      - "traefik.http.services.connectors.loadbalancer.server.port=8003"
    networks:
      - sovereign-net
